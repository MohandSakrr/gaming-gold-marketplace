kind = "web"
previewPath = "/"
title = "Gaming Marketplace"
version = "1.0.0"
id = "artifacts/gaming-marketplace"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21244

[services.development]
run = "pnpm --filter @workspace/gaming-marketplace run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gaming-marketplace", "run", "build" ]
publicDir = "artifacts/gaming-marketplace/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21244"
BASE_PATH = "/"
